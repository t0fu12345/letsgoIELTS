<style>
        .waveform-container {
            width: 240px;
            height: 240px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #1CB0F6;
            animation: pulse 2s ease-out infinite;
            opacity: 0;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        .core-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #006590, #1cb0f6);
            border-radius: 50%;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(28, 176, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .record-fab {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: white;
            border: 4px solid #ba1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .record-fab.recording {
            background-color: #ba1a1a;
            border-radius: 24px;
            transform: scale(0.9);
        }
        
        .record-fab .material-symbols-outlined {
            font-size: 36px;
            color: #ba1a1a;
            transition: color 0.3s ease;
        }
        
        .record-fab.recording .material-symbols-outlined {
            color: white;
            content: "stop"; /* Visually changing icon via JS usually, just styling here */
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- Top App Bar - Minimal for focused task -->
<header class="w-full h-nav-height flex justify-between items-center px-4 md:px-margin-desktop max-w-container-max mx-auto z-50">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="text-title-lg font-title-lg text-primary">
            Speaking Room
        </div>
<div class="w-12 h-12"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile relative">
<!-- Interactive AI Interviewer Visual -->
<div class="flex-grow flex flex-col items-center justify-center w-full max-w-2xl gap-8">
<div class="waveform-container mb-8">
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<div class="core-circle">
<span class="material-symbols-outlined text-white text-[48px]" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
</div>
</div>
<!-- Subtitle Panel -->
<div class="w-full text-center min-h-[100px] flex items-center justify-center px-4">
<h2 class="text-headline-md font-headline-md text-on-surface-text max-w-xl" id="ai-subtitle">
                    "Part 1: Let's talk about your hometown. Where is your hometown located?"
                </h2>
</div>
<!-- Contextual Status -->
<div class="text-label-lg font-label-lg text-primary-container h-6 flex items-center space-x-2 opacity-80" id="status-indicator">
<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
<span>AI is listening...</span>
</div>
</div>
<!-- Recording Controls (Bottom fixed relative to viewport) -->
<div class="pb-12 pt-8 w-full flex flex-col items-center justify-center">
<button aria-label="Start Recording" class="record-fab" id="recordButton">
<span class="material-symbols-outlined" id="recordIcon" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<p class="text-label-lg font-label-lg text-on-surface-variant mt-4">Tap to record</p>
</div>
</main>
<script>
        const recordBtn = document.getElementById('recordButton');
        const recordIcon = document.getElementById('recordIcon');
        const aiSubtitle = document.getElementById('ai-subtitle');
        const statusIndicator = document.getElementById('status-indicator');
        let isRecording = false;

        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;
            
            if (isRecording) {
                recordBtn.classList.add('recording');
                recordIcon.textContent = 'stop';
                aiSubtitle.style.opacity = '0.5';
                statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-error animate-pulse"></span><span class="text-error">Recording...</span>';
                
                // Hide pulsing rings during recording
                document.querySelectorAll('.pulse-ring').forEach(el => el.style.display = 'none');
                
            } else {
                recordBtn.classList.remove('recording');
                recordIcon.textContent = 'mic';
                aiSubtitle.style.opacity = '1';
                
                // Show processing state
                statusIndicator.innerHTML = '<span class="material-symbols-outlined text-[16px] animate-spin">sync</span><span>AI is analyzing your pronunciation...</span>';
                
                // Restore rings
                document.querySelectorAll('.pulse-ring').forEach(el => el.style.display = 'block');
                
                // Simulate processing finish
                setTimeout(() => {
                    statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span><span>AI is listening...</span>';
                    aiSubtitle.textContent = "What do you like most about living there?";
                }, 3000);
            }
        });
    </script>
</body></html>
